name: Publish to PyPI
on:
  push:
    branches: [main]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install hatchling hatch
      - run: python -m hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
